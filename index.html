<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>챔쩔혝책쨔쨈챈혬쩐챌혘혺챔혡짹</title>
</head>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  canvas {
    position: absolute;
  }
</style>
<body>

  <canvas></canvas>
  <canvas></canvas>
  <canvas></canvas>

  <script>
    const [c1, c2, c3] = document.querySelectorAll('canvas');
    const [ctx1, ctx2, ctx3] = [c1, c2, c3].map(c => c.getContext('2d'));
    const rockets = [];
    const shards = [];
    const targets = [];
    const fidelity = 3;
    let counter = 0;

    c2.width = c3.width = window.innerWidth;
    c2.height = c3.height = window.innerHeight;

    // ANIMATION LOOP
    (function loop() {
      ctx2.fillStyle = "rgba(0, 0, 0, .1)";
      ctx2.fillRect(0, 0, c2.width, c2.height);

      counter += 1;
      if (counter % 15 === 0) {
        rockets.push(new Rocket());
      }

      rockets.forEach((r, i) => {
        r.draw();
        r.update();
        if (r.ySpeed > 0) {
          r.explode();
          rockets.splice(i, 1);
        }
      });

      shards.forEach((s, i) => {
        s.draw();
        s.update();

        if (s.timer >= s.ttl || s.lightness >= 99) {
          ctx3.fillRect(s.target.x, s.target.y, fidelity + 1, fidelity + 1);
          shards.splice(i, 1);
        }
      });

      requestAnimationFrame(loop);
    })();

    // Rocket class
    class Rocket {
      constructor() {
        this.x = Math.random() * c2.width;
        this.y = c2.height - 15;
        this.blastSpeed = 6 + Math.random() * 7;
        this.shardCount = 15 + Math.floor(Math.random() * 15);
        this.xSpeed = Math.random() * 4 - 2;
        this.ySpeed = -this.blastSpeed;
        this.hue = Math.floor(Math.random() * 360);
      }

      draw() {
        ctx2.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        ctx2.fillRect(this.x, this.y, 5, 15);
      }

      update() {
        this.x += this.xSpeed;
        this.y += this.ySpeed;
        this.ySpeed += 0.1;
      }

      explode() {
        for (let i = 0; i < this.shardCount; i++) {
          shards.push(new Shard(this.x, this.y, this.hue));
        }
      }
    }

    // Shard class
    class Shard {
      constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        this.hue = hue;
        // ... (rest of Shard class, similar to previous examples)
      }

      // ... (methods of Shard class, similar to previous examples)
    }
  </script>

</body>
</html>
